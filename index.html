<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Surprise for Meku</title>
    <style>
        /* Core System Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0022 0%, #29003b 50%, #44003c 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            perspective: 1200px; /* Essential for the 3D text effects */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Master Background Canvas */
        .bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 1.2s ease-out;
        }

        /* Frosted Glass Initial Choice Prompt Card */
        .card-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 90%;
            max-width: 380px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            transition: all 1s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }
        .card-bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        .card-content {
            position: relative;
            z-index: 2;
            padding: 45px 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
        }
        h1 { font-size: 2.3rem; color: #fff; margin-bottom: 12px; font-weight: 800; }
        p { font-size: 1.15rem; color: #fecfef; margin-bottom: 35px; font-weight: 300; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 16px 20px; border-radius: 50px; font-size: 0.95rem; font-weight: 700; border: none; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; outline: none; }
        .btn-yes { background: linear-gradient(45deg, #ff4081, #ff758c); color: white; box-shadow: 0 8px 25px rgba(255, 64, 129, 0.4); }
        .btn-yes:hover { transform: translateY(-3px); }
        .btn-no { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }

        /* --- Premium Birthday Photo Framer --- */
        .photo-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            z-index: 5;
            width: 85%;
            max-width: 450px;
            aspect-ratio: 4/5;
            border-radius: 24px;
            padding: 12px;
            background: linear-gradient(45deg, #ff4081, #00e5ff, #bca3ff);
            background-size: 300% 300%;
            animation: borderGlow 6s ease infinite;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            opacity: 0;
            visibility: hidden;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .photo-stage.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        .photo-stage.fade-out {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8) rotateY(90deg);
        }
        .photo-frame {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: #110022;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Premium 3D Grand Finale Text --- */
        .grand-finale {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(-90deg) scale(0.3);
            z-index: 15;
            text-align: center;
            width: 95%;
            opacity: 0;
            visibility: hidden;
            transform-style: preserve-3d;
            transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .grand-finale.reveal {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) rotateX(0deg) scale(1);
        }
        .hbd-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            line-height: 1.2;
            text-shadow: 0 1px 0 #ccc, 0 2px 0 #c5c5c5, 0 3px 0 #bbb, 0 4px 0 #b0b0b0, 0 5px 0 #a5a5a5,
                         0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3),
                         0 3px 5px rgba(0,0,0,.2), 0 7px 10px rgba(0,0,0,.25), 0 15px 25px rgba(255, 64, 129, 0.5);
            animation: simplePulse 2s infinite ease-in-out;
        }

        /* Keyframe Animations */
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes simplePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
    </style>
</head>
<body>

    <canvas id="outerBgCanvas" class="bg-canvas"></canvas>

    <div class="card-container" id="mainCard">
        <canvas id="cardBgCanvas" class="card-bg-canvas"></canvas>
        <div class="card-content">
            <h1>Happy Birthday Meku🎂🎉</h1>
            <p>Do you want to see your gift?</p>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="startSurprise()">Yes Please</button>
                <button class="btn btn-no" onclick="alert('Wrong button! 😉 Tap Yes Please!')">No Thanks</button>
            </div>
        </div>
    </div>

    <div class="photo-stage" id="photoStage">
        <div class="photo-frame">
            <img src="https://i.postimg.cc/50J51BB3/IMG-20260525-200722-687.jpg" alt="Meku's Birthday Display">
        </div>
    </div>

    <div class="grand-finale" id="finaleStage">
        <div class="hbd-text">Happy Birthday<br>Meku 🎂 🥳 🎉</div>
    </div>

    <script>
        // --- PROMPT ENGINE MANAGEMENT ---
        function startSurprise() {
            const mainCard = document.getElementById('mainCard');
            const outerCanvas = document.getElementById('outerBgCanvas');
            const photoStage = document.getElementById('photoStage');
            const finaleStage = document.getElementById('finaleStage');

            // Step 1: Disappear initial card window
            mainCard.style.opacity = '0';
            mainCard.style.transform = 'translate(-50%, -100%) scale(0.5)';
            
            setTimeout(() => {
                mainCard.style.display = 'none';
                
                // Step 2: Bring forward the gorgeous, glowing birthday photo frame
                photoStage.classList.add('show');
                
                // Step 3: Wait for the photo viewing time frame, then drop out
                setTimeout(() => {
                    photoStage.classList.add('fade-out');
                    
                    // Step 4: Launch the stunning 3D Happy Birthday text pop-up
                    setTimeout(() => {
                        photoStage.style.display = 'none';
                        // Keep outer engine active for final effect, fade canvas back in softly if desired
                        outerCanvas.style.opacity = '1';
                        finaleStage.classList.add('reveal');
                    }, 1200);

                }, 4500); // 4.5 Seconds photo viewing duration

            }, 1000);
        }

        // --- BACKGROUND GRAPHICS ENGINE ---
        const bgCanvas = document.getElementById('outerBgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const cardCanvas = document.getElementById('cardBgCanvas');
        const cardCtx = cardCanvas.getContext('2d');
        let bgElements = [], cardParticles = [];
        const totalBalloons = 12;
        const totalSparkles = 35;
        const totalBlobs = 12;

        const mouse = { x: null, y: null };

        function initSizes() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            const rect = cardCanvas.parentElement.getBoundingClientRect();
            cardCanvas.width = rect.width;
            cardCanvas.height = rect.height;
        }
        window.addEventListener('resize', initSizes);
        
        /* POINTER TRAIL TRACKERS */
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            for(let i=0; i<2; i++) {
                bgElements.push(new Sparkle(mouse.x, mouse.y, true));
            }
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            for(let i=0; i<2; i++) {
                bgElements.push(new Sparkle(mouse.x, mouse.y, true));
            }
        });

        const themeColors = [{r:255,g:82,b:142}, {r:206,g:104,b:255}, {r:51,g:219,b:255}, {r:255,g:210,b:76}];

        class OuterBalloon {
            constructor() { 
                this.type = 'balloon';
                this.reset(); 
                this.y = Math.random() * (bgCanvas.height + 200); 
            }
            reset() {
                this.x = Math.random() * bgCanvas.width; 
                this.y = bgCanvas.height + 100;
                this.radius = Math.random() * 14 + 18; 
                this.color = themeColors[Math.floor(Math.random() * themeColors.length)];
                this.speedY = Math.random() * 0.5 + 0.3; 
                this.angle = Math.random() * Math.PI;
                this.swingSpeed = Math.random() * 0.01 + 0.005;
            }
            update() { 
                this.y -= this.speedY; 
                this.angle += this.swingSpeed; 
                this.x += Math.sin(this.angle) * 0.4; 
                if (this.y < -this.radius * 3) this.reset(); 
            }
            draw() {
                bgCtx.save(); 
                
                bgCtx.beginPath();
                bgCtx.moveTo(this.x, this.y + (this.radius * 1.3));
                bgCtx.quadraticCurveTo(this.x + Math.sin(this.angle) * 8, this.y + (this.radius * 1.3) + 20, this.x, this.y + (this.radius * 1.3) + 45);
                bgCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                bgCtx.lineWidth = 1;
                bgCtx.stroke();

                bgCtx.beginPath(); 
                bgCtx.translate(this.x, this.y); 
                bgCtx.scale(1, 1.3);
                let grad = bgCtx.createRadialGradient(-this.radius*0.3, -this.radius*0.3, this.radius*0.1, 0, 0, this.radius);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
                grad.addColorStop(0.3, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.35)`);
                grad.addColorStop(1, `rgba(${this.color.r*0.3}, ${this.color.g*0.3}, ${this.color.b*0.3}, 0.35)`);
                bgCtx.fillStyle = grad;
                bgCtx.arc(0, 0, this.radius, 0, Math.PI * 2);
                bgCtx.fill();
                bgCtx.restore();
            }
        }

        class Sparkle {
            constructor(x = null, y = null, isMouseTrail = false) {
                this.type = 'sparkle';
                this.isMouseTrail = isMouseTrail;
                if (isMouseTrail) {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 2.5 + 1.5;
                    this.speedY = Math.random() * 1.2 - 0.4;
                    this.speedX = Math.random() * 1.6 - 0.8;
                } else {
                    this.reset();
                    this.y = Math.random() * bgCanvas.height;
                }
            }
            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = -20;
                this.size = Math.random() * 2.5 + 1;
                this.speedY = Math.random() * 0.4 + 0.2;
                this.speedX = Math.sin(Math.random() * 2) * 0.15;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.isMouseTrail) { this.size -= 0.05; } 
                else if (this.y > bgCanvas.height) { this.reset(); }
            }
            draw() {
                if (this.size <= 0) return;
                const picked = themeColors[Math.floor(Math.random() * themeColors.length)];
                bgCtx.save();
                bgCtx.globalAlpha = this.isMouseTrail ? Math.max(0, this.size) : 0.5;
                bgCtx.shadowBlur = this.size * 3;
                bgCtx.shadowColor = `rgb(${picked.r}, ${picked.g}, ${picked.b})`;
                bgCtx.fillStyle = `rgb(${picked.r}, ${picked.g}, ${picked.b})`;
                bgCtx.beginPath();
                bgCtx.translate(this.x, this.y);
                for (let i = 0; i < 4; i++) {
                    bgCtx.lineTo(0, this.size * 2.5);
                    bgCtx.lineTo(this.size * 0.5, this.size * 0.5);
                    bgCtx.rotate(Math.PI / 2);
                }
                bgCtx.closePath();
                bgCtx.fill();
                bgCtx.restore();
            }
        }

        class CardLiquidBlob {
            constructor() {
                this.x = Math.random() * 300;
                this.y = Math.random() * 400;
                this.radius = Math.random() * 50 + 50;
                this.speedX = (Math.random() * 0.6) - 0.3;
                this.speedY = (Math.random() * 0.6) - 0.3;
                this.color = ['rgba(255, 64, 129, ', 'rgba(0, 229, 255, ', 'rgba(156, 39, 176, '][Math.floor(Math.random() * 3)];
                this.alpha = Math.random() * 0.12 + 0.08;
                this.grow = Math.random() > 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > cardCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > cardCanvas.height) this.speedY *= -1;
                
                if (this.grow) { this.radius += 0.08; if(this.radius > 120) this.grow = false; }
                else { this.radius -= 0.08; if(this.radius < 50) this.grow = true; }
            }
            draw() {
                cardCtx.beginPath();
                let gradient = cardCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, this.color + this.alpha + ')');
                gradient.addColorStop(1, this.color + '0)');
                cardCtx.fillStyle = gradient;
                cardCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                cardCtx.fill();
            }
        }

        function init() {
            initSizes();
            bgElements = [];
            cardParticles = [];
            
            for (let i = 0; i < totalBalloons; i++) bgElements.push(new OuterBalloon());
            for (let i = 0; i < totalSparkles; i++) bgElements.push(new Sparkle());
            for (let i = 0; i < totalBlobs; i++) cardParticles.push(new CardLiquidBlob());
        }

        function runEngine() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            for (let i = 0; i < bgElements.length; i++) {
                bgElements[i].update();
                bgElements[i].draw();
                if (bgElements[i].type === 'sparkle' && bgElements[i].isMouseTrail && bgElements[i].size <= 0) {
                    bgElements.splice(i, 1);
                    i--;
                }
            }

            cardCtx.clearRect(0, 0, cardCanvas.width, cardCanvas.height);
            for (let i = 0; i < cardParticles.length; i++) {
                cardParticles[i].update();
                cardParticles[i].draw();
            }

            requestAnimationFrame(runEngine);
        }

        init();
        setTimeout(initSizes, 150);
        runEngine();
    </script>
</body>
</html>
